name: release-please
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - releases/v*

permissions:
  contents: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4.3.0
        id: release
        with:
          token: ${{ vars.token }}
          target-branch: ${{ github.ref_name }}

      - uses: actions/checkout@v4

